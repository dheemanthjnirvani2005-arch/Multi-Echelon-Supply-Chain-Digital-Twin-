# docker-compose.prod.yml
version: '3.9'
services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://scadmin:scpassword@postgres:5432/supplychain
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: scpassword
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      SMTP_HOST: ${SMTP_HOST:-smtp.mailgun.org}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-alerts@supplychain-twin.local}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-admin@supplychain-twin.local}
    depends_on: [postgres, redis, neo4j, mosquitto]
    ports: ['8000:8000']

  celery_worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://scadmin:scpassword@postgres:5432/supplychain
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: scpassword
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      SMTP_HOST: ${SMTP_HOST:-smtp.mailgun.org}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-alerts@supplychain-twin.local}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-admin@supplychain-twin.local}
    depends_on: [redis, postgres, neo4j, mosquitto]

  frontend:
    build: ./frontend
    ports: ['80:80']
    depends_on: [backend]

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: supplychain
      POSTGRES_USER: scadmin
      POSTGRES_PASSWORD: scpassword
    volumes: ['pgdata:/var/lib/postgresql/data']

  redis:
    image: redis:7-alpine

  neo4j:
    image: neo4j:5
    environment: { NEO4J_AUTH: neo4j/scpassword }
    volumes: ['neo4jdata:/data']

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - '1883:1883'    # MQTT protocol port
      - '9001:9001'    # WebSocket port (browsers)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/supplychain
      KC_DB_USERNAME: scadmin
      KC_DB_PASSWORD: scpassword
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  pgdata:
  neo4jdata:
  mosquitto_data:
  mosquitto_log:

